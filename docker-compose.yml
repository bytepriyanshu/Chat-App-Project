version: "3.9"

services:
  backend:
    build: 
      context: ./backend
    container_name: chatapp-backend
    restart: unless-stopped
    ports:
     - "5000:5000"
    env_file:
     - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: chatapp-frontend
    restart: unless-stopped
    ports:
     - "3000:3000"
    env_file:
     - ./frontend/.env
    depends_on:
     - backend